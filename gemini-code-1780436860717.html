<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner de Códigos QR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Zona de la cámara */
        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            background: #222;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
            background-color: #3498db;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-bottom: 15px;
        }

        button:active {
            background-color: #2980b9;
        }

        button.scanning {
            background-color: #e74c3c;
        }

        /* Historial de Lecturas */
        .history-section {
            margin-top: 20px;
        }

        .history-section h2 {
            font-size: 1.2rem;
            color: #2c3e50;
            margin-bottom: 10px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 5px;
        }

        .history-list {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
        }

        .history-item {
            background: #f8f9fa;
            padding: 10px;
            border-left: 4px solid #2ecc71;
            margin-bottom: 8px;
            border-radius: 0 4px 4px 0;
            font-size: 0.9rem;
            word-break: break-all;
        }

        .history-item .date {
            display: block;
            font-size: 0.75rem;
            color: #7f8c8d;
            margin-top: 4px;
        }

        .empty-state {
            text-align: center;
            color: #95a5a6;
            font-style: italic;
            padding: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Escáner QR Pro</h1>
    </header>

    <div class="container">
        <div id="reader"></div>

        <button id="btn-scan">Iniciar Escáner</button>

        <div class="history-section">
            <h2>Registros Guardados</h2>
            <ul id="history-list" class="history-list">
                <li class="empty-state" id="empty-message">No hay códigos escaneados aún.</li>
            </ul>
        </div>
    </div>

    <script>
        const btnScan = document.getElementById('btn-scan');
        const historyList = document.getElementById('history-list');
        const emptyMessage = document.getElementById('empty-message');
        
        let html5QrCode;
        let isScanning = false;

        // Configuración del escáner (prioriza la cámara trasera en móviles)
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        // Inicializar el objeto de escaneo apuntando al div #reader
        html5QrCode = new Html5Qrcode("reader");

        // Cargar historial previo de localStorage al iniciar
        document.addEventListener('DOMContentLoaded', loadHistory);

        btnScan.addEventListener('click', () => {
            if (!isScanning) {
                startScanner();
            } else {
                stopScanner();
            }
        });

        function startScanner() {
            btnScan.textContent = "Detener Cámara";
            btnScan.classList.add('scanning');
            isScanning = true;

            // 'environment' fuerza el uso de la cámara trasera
            html5QrCode.start(
                { facingMode: "environment" }, 
                config,
                onScanSuccess,
                onScanFailure
            ).catch(err => {
                console.error("Error al iniciar la cámara:", err);
                alert("No se pudo acceder a la cámara. Asegúrate de dar los permisos necesarios.");
                stopScanner();
            });
        }

        function stopScanner() {
            if (isScanning) {
                html5QrCode.stop().then(() => {
                    btnScan.textContent = "Iniciar Escáner";
                    btnScan.classList.remove('scanning');
                    isScanning = false;
                }).catch(err => console.error("Error al detener el escáner:", err));
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            // Detener el escáner inmediatamente tras una lectura exitosa (opcional, evita lecturas repetidas en bucle)
            stopScanner();

            // Obtener fecha y hora actual formateada
            const now = new Date();
            const dateTimeString = now.toLocaleDateString() + ' ' + now.toLocaleTimeString();

            // Guardar en la lista y en LocalStorage
            saveRecord(decodedText, dateTimeString);
        }

        function onScanFailure(error) {
            // Este callback se ejecuta constantemente mientras busca códigos QR. 
            // Lo dejamos vacío para evitar saturar la consola de advertencias.
        }

        function saveRecord(text, dateTime) {
            // Quitar mensaje de lista vacía
            if (emptyMessage) emptyMessage.remove();

            // Crear objeto del registro
            const record = { text, dateTime };

            // Guardar en LocalStorage
            let history = JSON.parse(localStorage.getItem('qr_history')) || [];
            history.unshift(record); // Añade al inicio del array
            localStorage.setItem('qr_history', JSON.stringify(history));

            // Renderizar en la interfaz
            renderItem(text, dateTime, true);
        }

        function renderItem(text, dateTime, prepend = false) {
            const li = document.createElement('li');
            li.classList.add('history-item');
            
            // Validar si el texto es un enlace web para transformarlo en link cliqueable
            if (text.startsWith('http://') || text.startsWith('https://')) {
                li.innerHTML = `<a href="${text}" target="_blank" style="color: #2980b9;">${text}</a>`;
            } else {
                li.textContent = text;
            }

            const spanDate = document.createElement('span');
            spanDate.classList.add('date');
            spanDate.textContent = `Escaneado el: ${dateTime}`;
            li.appendChild(spanDate);

            if (prepend) {
                historyList.insertBefore(li, historyList.firstChild);
            } else {
                historyList.appendChild(li);
            }
        }

        function loadHistory() {
            let history = JSON.parse(localStorage.getItem('qr_history')) || [];
            if (history.length > 0 && emptyMessage) {
                emptyMessage.remove();
            }
            history.forEach(record => {
                renderItem(record.text, record.dateTime);
            });
        }
    </script>
</body>
</html>
